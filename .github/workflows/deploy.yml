name: CI/CD Deploy to Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to your project directory on the server
            # Update this path to where your project lives on the server
            cd /opt/projects/Digital-Signage-System/
            
            # Pull the latest code from the main branch
            git pull origin main
            
            # Rebuild the images and restart the containers
            # The -d flag runs them in the background
            # The --build flag ensures any new dependencies or code changes are baked into the image
            docker compose up -d --build
