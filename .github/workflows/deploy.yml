name: CI/CD Deploy to Existing Directory

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: [self-hosted, localAppserver]

    steps:
      - name: Update Code and Restart Docker
        run: |
          # 1. Navigate to your specific deployment directory
          # REPLACE THIS with your actual path on the server
          cd /opt/projects/Digital-Signage-System/
          
          # 2. Pull the latest code from GitHub
          # (This assumes the folder is already a git repository connected to origin)
          sudo git fetch origin
          sudo git reset --hard origin/main
          
          # 3. Rebuild and restart the Docker containers
          # The --build flag ensures frontend/backend Dockerfiles pick up new changes
          sudo docker compose up -d --build
