services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8888:8888"
    volumes:
      # Persist SQLite Database and Uploads
      - ./server/signage.db:/app/server/signage.db
      - ./server/uploads:/app/server/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Since you are using host Nginx later, point this to the host's IP/Domain where the backend is accessible
        VITE_API_URL: http://localhost:8888
    ports:
      - "3200:3200" 
    depends_on:
      - backend
    restart: unless-stopped
